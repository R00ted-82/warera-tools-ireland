name: Bunker event logger

on:
  schedule:
    - cron: "17 */2 * * *"   # every 2h, offset off the hour
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bunker-log
  cancel-in-progress: false

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run logger
        run: python bunker_log.py
      - name: Commit data
        run: |
          git config user.name "bunker-log-bot"
          git config user.email "bunker-log-bot@users.noreply.github.com"
          git add data/state.json data/events.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "bunker-log: $(date -u +%FT%TZ)"
            git push
          fi