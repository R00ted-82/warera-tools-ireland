name: Bunker event logger

on:
  schedule:
    # - cron: "17 */2 * * *"   # every 2h, offset off the hour
    - cron: "17 */4 * * *"   # every 4h, offset off the hour
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bunker-log
  cancel-in-progress: false

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run logger
        run: python bunker_log.py
      - name: List output
        run: |
          echo "--- repo root ---"
          ls -la
          echo "--- data dir ---"
          ls -la data/ || echo "NO data/ DIR AT REPO ROOT"
          echo "--- find state.json anywhere ---"
          find . -name state.json
          echo "--- is data/ gitignored? ---"
          git check-ignore data/state.json && echo "IGNORED" || echo "not ignored"
      - name: Commit data
        run: |
          git config user.name "bunker-log-bot"
          git config user.email "bunker-log-bot@users.noreply.github.com"
          git add data/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "bunker-log: $(date -u +%FT%TZ)"
            git push
          fi