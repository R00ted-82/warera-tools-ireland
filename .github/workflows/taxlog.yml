name: Tax logger

on:
  schedule:
    # Daily, with built-in retries. The script records ONE entry per day and
    # only writes when it actually sees wage data — an outage run writes
    # nothing and exits, so the next cron retries ~2h later. Once a day has a
    # good entry, later runs that day see it's done and exit immediately.
    # All four times sit within the same UTC day so every attempt files under
    # the same date (clean Mon–Sun weekly totals).
    - cron: "07 16 * * *"   # 16:07 UTC — first attempt
    - cron: "07 18 * * *"   # 18:07 UTC — retry if 16:07 found no data
    - cron: "07 20 * * *"   # 20:07 UTC — retry
    - cron: "07 22 * * *"   # 22:07 UTC — last attempt before midnight
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tax-log
  cancel-in-progress: false

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tax logger
        run: python tax_log.py

      - name: Commit data
        run: |
          git config user.name "tax-log-bot"
          git config user.email "tax-log-bot@users.noreply.github.com"
          git add data/tax 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "tax-log: $(date -u +%FT%TZ)"
            git push
          fi
