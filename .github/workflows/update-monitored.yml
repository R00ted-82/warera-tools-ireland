# .github/workflows/update-monitored.yml
# Listens for repository_dispatch events from the Wealth Monitor tool.
# Validates the payload, verifies the user is an Irish citizen via the
# warera-proxy gateway, toggles them on monitored-users.json, commits.
#
# The 'add' path verifies citizenship server-side (the browser-side gate
# with ?bypass=1 is convenience only and cannot be trusted, since anyone
# can POST to the Worker). The 'remove' path does not check — removing a
# non-Irish entry that somehow snuck in is desirable.
#
# The gateway calls send an Origin: https://tools.we-ie.com header so the
# proxy's CORS gate accepts them. Without that header, the proxy rejects
# GitHub Action runners with HTTP 403.

name: Update monitored users

on:
  repository_dispatch:
    types: [monitored-update]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitored-write
  cancel-in-progress: false

jobs:
  update:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate and update monitored list
        env:
          ACTION: ${{ github.event.client_payload.action }}
          USER_ID: ${{ github.event.client_payload.userId }}
          USERNAME: ${{ github.event.client_payload.username }}
        run: |
          set -e
          python3 <<'PY'
          import json, os, re, sys, urllib.request, urllib.parse, urllib.error
          from datetime import datetime, timezone

          IRELAND_COUNTRY_ID = '6813b6d446e731854c7ac7fe'
          ORIGIN = 'https://tools.we-ie.com'

          action   = os.environ.get('ACTION', '').strip()
          user_id  = os.environ.get('USER_ID', '').strip()
          username = os.environ.get('USERNAME', '').strip()

          # ── Structural validation ──────────────────────────────
          if action not in ('add', 'remove'):
              print(f'::error::Invalid action: {action!r}')
              sys.exit(1)

          # MongoDB ObjectId — 24 hex chars
          if not re.fullmatch(r'[a-f0-9]{24}', user_id):
              print(f'::error::Invalid userId format: {user_id!r}')
              sys.exit(1)

          if not (1 <= len(username) <= 40):
              print(f'::error::Invalid username length: {len(username)}')
              sys.exit(1)
          if not re.fullmatch(r'[A-Za-z0-9_\-. ]+', username):
              print(f'::error::Invalid username characters: {username!r}')
              sys.exit(1)

          # ── Citizenship verification via warera-proxy ──────────
          # The Origin header gets us past the proxy's CORS gate (Action
          # runners are otherwise rejected). For 'add' we confirm the user
          # is an Irish citizen and adopt the canonical username. 'remove'
          # needs no check.
          def trpc(method, payload, timeout=20):
              inp = urllib.parse.quote(json.dumps(payload))
              url = f'https://warera-proxy.toie.workers.dev/trpc/{method}?input={inp}'
              req = urllib.request.Request(url, headers={
                  'Origin': ORIGIN,
                  'Accept': 'application/json',
                  'User-Agent': 'warera-wealth-monitor-action/1.0',
              })
              with urllib.request.urlopen(req, timeout=timeout) as r:
                  return json.load(r).get('result', {}).get('data')

          if action == 'add':
              try:
                  user_data = trpc('user.getUserById', {'userId': user_id}) or {}
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      print(f'::error::No War Era user with id {user_id}')
                      sys.exit(1)
                  print(f'::error::Gateway returned HTTP {e.code} for {user_id}')
                  sys.exit(1)
              except Exception as e:
                  print(f'::error::Gateway lookup failed: {e}')
                  sys.exit(1)

              if not user_data.get('_id'):
                  print(f'::error::No War Era user with id {user_id}')
                  sys.exit(1)

              country = user_data.get('country') or user_data.get('countryId')
              if country != IRELAND_COUNTRY_ID:
                  print(f'::error::User {user_id} is not an Irish citizen (country={country!r})')
                  sys.exit(1)

              real_username = user_data.get('username')
              if real_username:
                  username = real_username

          # ── Read existing list ─────────────────────────────────
          path = 'monitored-users.json'
          try:
              with open(path, 'r', encoding='utf-8') as f:
                  ml = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
              ml = {'entries': []}

          if 'entries' not in ml or not isinstance(ml['entries'], list):
              ml['entries'] = []

          # ── Apply action ───────────────────────────────────────
          existing = next((e for e in ml['entries'] if e.get('userId') == user_id), None)
          now = datetime.now(timezone.utc).isoformat()

          if action == 'add':
              if existing:
                  existing['username'] = username
                  existing['updatedAt'] = now
                  msg = f'Update {username} on wealth monitor'
              else:
                  ml['entries'].append({
                      'userId': user_id,
                      'username': username,
                      'addedAt': now,
                  })
                  msg = f'Add {username} to wealth monitor'
          else:  # remove
              if not existing:
                  print(f'::notice::{username} ({user_id}) was not monitored; nothing to remove')
                  sys.exit(0)
              ml['entries'] = [e for e in ml['entries'] if e.get('userId') != user_id]
              msg = f'Remove {username} from wealth monitor'

          ml['updatedAt'] = now

          # ── Write back ─────────────────────────────────────────
          with open(path, 'w', encoding='utf-8') as f:
              json.dump(ml, f, indent=2, ensure_ascii=False)
              f.write('\n')

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'COMMIT_MSG={msg}\n')
          PY

      - name: Commit changes
        run: |
          git add monitored-users.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "${COMMIT_MSG:-Update monitored users}"
          git push
