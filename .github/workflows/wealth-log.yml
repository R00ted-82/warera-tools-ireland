name: Wealth logger

on:
  schedule:
    # Twice a day, late UTC, for redundancy: if one run fails (API hiccup,
    # etc.) the other still captures the day. History is daily-deduped, so
    # both land on the same day's single point (latest wins) — the page reads
    # the live value for "today" regardless.
    - cron: "37 21 * * *"   # 21:37 UTC
    - cron: "37 23 * * *"   # 23:37 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wealth-log
  cancel-in-progress: false

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run logger
        run: python wealth_log.py
      - name: Commit data
        run: |
          git config user.name "wealth-log-bot"
          git config user.email "wealth-log-bot@users.noreply.github.com"
          git add data/wealth 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "wealth-log: $(date -u +%FT%TZ)"
            git push
          fi
