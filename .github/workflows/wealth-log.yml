name: Wealth logger

on:
  schedule:
    - cron: "37 */2 * * *"   # every 2h, offset off the hour
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wealth-log
  cancel-in-progress: false

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run logger
        run: python wealth_log.py
      - name: Commit data
        run: |
          git config user.name "wealth-log-bot"
          git config user.email "wealth-log-bot@users.noreply.github.com"
          git add data/wealth-history.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "wealth-log: $(date -u +%FT%TZ)"
            git push
          fi
